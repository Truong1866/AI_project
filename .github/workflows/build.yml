name: Build Desktop Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux System Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # Cài đặt Nuitka và cả PyInstaller
      - name: Install Dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt
          uv pip install nuitka zstandard pyinstaller

      # [DÀNH CHO WINDOWS & LINUX]: Đóng gói bằng Nuitka
      - name: Build with Nuitka (Windows & Linux)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          uv run python -m nuitka \
            --assume-yes-for-downloads \
            --standalone \
            --onefile \
            --enable-plugin=pyqt6 \
            --noinclude-qt-plugins=sensible,bluetooth,qml,webengine,spatialaudio \
            --output-dir=dist \
            main.py

      # [DÀNH RIÊNG CHO MACOS]: Đóng gói bằng PyInstaller để tránh lỗi PyQt6
      - name: Build with PyInstaller (macOS Fallback)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          uv run pyinstaller \
            --onefile \
            --windowed \
            --distpath dist \
            main.py

      # Tải toàn bộ kết quả lên Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AI_Project-${{ matrix.os }}
          path: dist/*